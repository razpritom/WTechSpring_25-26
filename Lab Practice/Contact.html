<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us Form</title>
    <link rel="stylesheet" href="D:\AIUB\11th Semester\Web Tech\WTechSpring_25-26\Lab Practice\Design.css">
</head>
<body>

    <h1>Contact Us</h1>

    <form>
        <table>
            <tr>
                <td>
                    <label for="FirstName">First Name</label><br>
                    <input type="text" id="FirstName" name="FirstName" placeholder="Enter First Name">
                </td>
                <td>
                    <label for="LastName">Last Name</label><br>
                    <input type="text" id="LastName" name="LastName" placeholder="Enter Last Name">
                </td>
            </tr>
            <tr>
                <td>
                    <label for="Email">Email</label><br>
                    <input type="email" id="Email" name="Email" placeholder="Enter Email">
                </td>
                <td>
                    <label for="Phone">Phone Number</label><br>
                    <input type="tel" id="Phone" name="Phone" placeholder="Enter Phone Number">
                </td>
            </tr>
            <tr>
                <td colspan="2">
                    <label for="Query">What do you have in mind</label><br>
                    <textarea id="Query" name="Query" rows="4" placeholder="Please enter query..."></textarea>
                </td>
            </tr>
            <tr>
                <td colspan="2" style="text-align:center;">
                    <button type="submit">Submit</button>
                </td>
            </tr>
        </table>
    </form>

</body>
</html>
